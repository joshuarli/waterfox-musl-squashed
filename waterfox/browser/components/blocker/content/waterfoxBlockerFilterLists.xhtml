<?csp default-src chrome:; style-src chrome:; ?>

<window
  id="WaterfoxBlockerFilterListsWindow"
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  data-l10n-id="waterfox-blocker-filter-lists-window"
  data-l10n-attrs="title"
  persist="width height"
>
  <dialog
    id="waterfoxBlockerFilterListsDialog"
    buttons="accept,cancel"
    data-l10n-id="waterfox-blocker-filter-lists-dialog"
    data-l10n-attrs="buttonlabelaccept, buttonaccesskeyaccept"
  >
    <linkset>
      <html:link rel="stylesheet" href="chrome://global/skin/global.css" />
      <html:link
        rel="stylesheet"
        href="chrome://browser/skin/preferences/preferences.css"
      />
      <html:link
        rel="stylesheet"
        href="chrome://browser/content/blocker/waterfoxBlockerFilterLists.css"
      />

      <html:link rel="localization" href="browser/waterfox.ftl" />
    </linkset>

    <script src="chrome://browser/content/preferences/dialogs/waterfoxBlockerFilterLists.js" />

    <vbox class="contentPane" flex="1">
      <label
        id="waterfoxBlockerFilterListsDescription"
        data-l10n-id="waterfox-blocker-filter-lists-description"
      />
      <separator class="thin" />
      <hbox id="waterfoxBlockerFilterListsToolbar" align="center">
        <button
          id="waterfoxBlockerRefreshNow"
          data-l10n-id="waterfox-blocker-filter-lists-refresh-now"
        />
      </hbox>
      <label
        id="waterfoxBlockerNextRefresh"
        class="text-deemphasized waterfox-blocker-list-updated"
      />
      <separator class="thin" />
      <html:input
        id="waterfoxBlockerFilterListsSearch"
        type="search"
        data-l10n-id="waterfox-blocker-filter-lists-search"
        data-l10n-attrs="placeholder"
      />
      <separator class="thin" />
      <vbox
        id="waterfoxBlockerFilterListsScrollContainer"
        class="info-box-container waterfox-blocker-scroll-container"
        flex="1"
      >
        <vbox id="waterfoxBlockerFilterListsCategories" flex="1" />
      </vbox>
    </vbox>
  </dialog>
</window>
