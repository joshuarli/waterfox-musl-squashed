# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Waterfox Musl Minwayland

on:
  workflow_dispatch:

jobs:
  build-minwayland-release-x64:
    name: x86_64 musl minwayland release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: waterfox-musl-minwayland-x64-v1
      WFX_DOCKER_PLATFORM: linux/amd64
      WFX_IMAGE: waterfox-musl:edge-clang22
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore Waterfox musl cache
        uses: actions/cache@v5
        with:
          path: |
            .wfx-cache/apk
            .wfx-cache/build-deps
            .wfx-cache/cargo
            .wfx-cache/mozbuild
            .wfx-cache/sources
          key: waterfox-musl-minwayland-x64-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            waterfox-musl-minwayland-x64-${{ runner.os }}-

      - name: Build toolchain image
        uses: docker/build-push-action@v7
        with:
          context: docker/waterfox-musl
          file: docker/waterfox-musl/Dockerfile
          platforms: linux/amd64
          load: true
          tags: waterfox-musl:edge-clang22
          cache-from: type=gha,scope=waterfox-musl-toolchain-amd64
          cache-to: type=gha,scope=waterfox-musl-toolchain-amd64,mode=max

      - name: Build Waterfox
        shell: bash
        run: |
          jobs="$(nproc)"
          WFX_JOBS="$jobs" WFX_CARGO_JOBS="$jobs" \
            docker/waterfox-musl/wfx-musl build-minwayland-release-x64

      - name: Package Waterfox
        shell: bash
        run: |
          jobs="$(nproc)"
          WFX_JOBS="$jobs" WFX_CARGO_JOBS="$jobs" \
            docker/waterfox-musl/wfx-musl package-minwayland-release-x64

      - name: Smoke WebDriver BiDi
        shell: bash
        run: docker/waterfox-musl/wfx-musl smoke-webdriver-bidi-minwayland-release-x64

      - name: Verify xz artifact
        id: artifact
        shell: bash
        run: |
          artifact="$(find .wfx-cache/dist -maxdepth 1 -type f -name 'waterfox-*.stage1-minwayland-release-x64.tar.xz' | sort | tail -n 1)"
          test -n "$artifact"
          file "$artifact" | grep -qi 'XZ compressed data'
          tar -tJf "$artifact" >/dev/null
          echo "path=$artifact" >> "$GITHUB_OUTPUT"

      - name: Upload Waterfox musl minwayland tarball
        uses: actions/upload-artifact@v7
        with:
          name: waterfox-musl-minwayland-x64-tarball
          if-no-files-found: error
          path: .wfx-cache/dist/waterfox-*.stage1-minwayland-release-x64.tar.xz
          archive: false

      - name: Upload Waterfox musl minwayland reports
        uses: actions/upload-artifact@v7
        with:
          name: waterfox-musl-minwayland-x64-reports
          if-no-files-found: error
          path: |
            .wfx-cache/dist/waterfox-*.manifest.txt
            .wfx-cache/dist/waterfox-*.deps.txt
            .wfx-cache/dist/waterfox-*.needed.txt
            .wfx-cache/dist/waterfox-*.rejected-deps.txt
            .wfx-cache/dist/waterfox-*.cli-smoke.txt
            .wfx-cache/dist/waterfox-*.webdriver-bidi-smoke.txt
            .wfx-cache/dist/waterfox-*.webdriver-bidi-smoke.log

  build-minwayland-release-arm64:
    name: arm64 musl minwayland release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: waterfox-musl-minwayland-arm64-v1
      WFX_DOCKER_PLATFORM: linux/arm64
      WFX_IMAGE: waterfox-musl:edge-clang22
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore Waterfox musl cache
        uses: actions/cache@v5
        with:
          path: |
            .wfx-cache/apk
            .wfx-cache/build-deps
            .wfx-cache/cargo
            .wfx-cache/mozbuild
            .wfx-cache/sources
          key: waterfox-musl-minwayland-arm64-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            waterfox-musl-minwayland-arm64-${{ runner.os }}-

      - name: Build toolchain image
        uses: docker/build-push-action@v7
        with:
          context: docker/waterfox-musl
          file: docker/waterfox-musl/Dockerfile
          platforms: linux/arm64
          load: true
          tags: waterfox-musl:edge-clang22
          cache-from: type=gha,scope=waterfox-musl-toolchain-arm64
          cache-to: type=gha,scope=waterfox-musl-toolchain-arm64,mode=max

      - name: Build Waterfox
        shell: bash
        run: |
          jobs="$(nproc)"
          WFX_JOBS="$jobs" WFX_CARGO_JOBS="$jobs" \
            docker/waterfox-musl/wfx-musl build-minwayland-release-arm64

      - name: Package Waterfox
        shell: bash
        run: |
          jobs="$(nproc)"
          WFX_JOBS="$jobs" WFX_CARGO_JOBS="$jobs" \
            docker/waterfox-musl/wfx-musl package-minwayland-release-arm64

      - name: Smoke WebDriver BiDi
        shell: bash
        run: docker/waterfox-musl/wfx-musl smoke-webdriver-bidi-minwayland-release-arm64

      - name: Verify xz artifact
        id: artifact
        shell: bash
        run: |
          artifact="$(find .wfx-cache/dist -maxdepth 1 -type f -name 'waterfox-*.stage1-minwayland-release-arm64.tar.xz' | sort | tail -n 1)"
          test -n "$artifact"
          file "$artifact" | grep -qi 'XZ compressed data'
          tar -tJf "$artifact" >/dev/null
          echo "path=$artifact" >> "$GITHUB_OUTPUT"

      - name: Upload Waterfox musl minwayland tarball
        uses: actions/upload-artifact@v7
        with:
          name: waterfox-musl-minwayland-arm64-tarball
          if-no-files-found: error
          path: .wfx-cache/dist/waterfox-*.stage1-minwayland-release-arm64.tar.xz
          archive: false

      - name: Upload Waterfox musl minwayland reports
        uses: actions/upload-artifact@v7
        with:
          name: waterfox-musl-minwayland-arm64-reports
          if-no-files-found: error
          path: |
            .wfx-cache/dist/waterfox-*.manifest.txt
            .wfx-cache/dist/waterfox-*.deps.txt
            .wfx-cache/dist/waterfox-*.needed.txt
            .wfx-cache/dist/waterfox-*.rejected-deps.txt
            .wfx-cache/dist/waterfox-*.webdriver-bidi-smoke.txt
            .wfx-cache/dist/waterfox-*.webdriver-bidi-smoke.log

  publish-prerelease:
    name: Publish GitHub prerelease
    runs-on: ubuntu-24.04
    needs:
      - build-minwayland-release-x64
      - build-minwayland-release-arm64
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Waterfox musl minwayland tarballs
        uses: actions/download-artifact@v7
        with:
          pattern: waterfox-musl-minwayland-*-tarball
          path: release-assets
          merge-multiple: true

      - name: Create prerelease and upload tarballs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < browser/config/version_display.txt)"
          tag="waterfox-${version}-musl-minwayland-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          title="Waterfox ${version} musl minwayland ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          mapfile -t artifacts < <(find release-assets -type f -name 'waterfox-*.stage1-minwayland-release-*.tar.xz' | sort)
          if [ "${#artifacts[@]}" -ne 2 ]; then
            printf 'expected 2 release tarballs, found %s\n' "${#artifacts[@]}" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --draft=false \
              --prerelease=true
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --prerelease \
              --generate-notes
          fi

          gh release upload "$tag" "${artifacts[@]}" --clobber
